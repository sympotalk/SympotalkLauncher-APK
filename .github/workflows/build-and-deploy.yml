name: Build Android APK & Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write   # Release 생성/업데이트 권한

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
          cache-read-only: false

      # version.txt 와 build.gradle versionName 일치 검증 (버전 혼선 방지)
      - name: Verify version consistency
        run: |
          VERSION_TXT=$(cat version.txt | tr -d '[:space:]')
          VERSION_GRADLE=$(grep -oE 'versionName "([^"]+)"' android-app/app/build.gradle | grep -oE '"[^"]+"' | tr -d '"')
          echo "version.txt     = $VERSION_TXT"
          echo "build.gradle    = $VERSION_GRADLE"
          if [ "$VERSION_TXT" != "$VERSION_GRADLE" ]; then
            echo "::error::version.txt ($VERSION_TXT) 와 build.gradle versionName ($VERSION_GRADLE) 이 다릅니다!"
            echo "::error::두 값을 동일하게 맞춰주세요."
            exit 1
          fi

      # keystore 존재 여부 확인 (없으면 서명 불일치 → 업데이트 불가)
      - name: Check signing keystore
        run: |
          if [ -f android-app/release.keystore ]; then
            echo "::notice::✅ release.keystore found - APK will be consistently signed"
          else
            echo "::warning::⚠️ release.keystore NOT FOUND!"
            echo "::warning::APK will use auto-generated debug keystore (inconsistent signing)."
            echo "::warning::Run the 'Setup Signing Keystore' workflow first for installable updates."
          fi

      # 웹 파일을 Android assets 에 복사 (번들 기본 버전)
      - name: Copy web assets into Android project
        run: |
          ASSETS="android-app/app/src/main/assets/www"
          mkdir -p "$ASSETS"
          cp index.html manifest.json sw.js version.txt "$ASSETS/"

      - name: Build APK
        run: gradle assembleDebug --no-daemon --project-dir android-app
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Rename APK
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          mkdir -p dist
          # 고정 파일명 (앱 내 업데이터가 이 URL 로 요청)
          cp android-app/app/build/outputs/apk/debug/app-debug.apk \
             "dist/SympotalkLauncher.apk"
          # 버전명 파일명 (아카이브용)
          cp android-app/app/build/outputs/apk/debug/app-debug.apk \
             "dist/SympotalkLauncher-v${VERSION}.apk"
          echo "APK_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SympotalkLauncher-APK
          path: dist/*.apk
          retention-days: 30

      # 모든 main 푸시에 대해 Release 생성/업데이트 (앱 내 업데이터가 참조)
      - name: Create or Update GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APK_VERSION }}
          name: "Sympotalk 런처 v${{ env.APK_VERSION }}"
          make_latest: "true"
          body: |
            ## Sympotalk 런처 v${{ env.APK_VERSION }}

            자동 빌드된 APK 입니다.

            ### 설치 방법
            - 기존 앱이 설치되어 있으면: APK 다운로드 → 탭 → "업데이트"
            - 처음 설치: 설정 → 알 수 없는 출처 허용 → APK 탭 → 설치
            - 앱 내에서: 설정 탭 → "앱 업데이트 확인" (v1.0.11+)

            **참고**: `SympotalkLauncher.apk` 는 항상 최신 버전입니다 (앱 내 업데이터 전용).
          files: |
            dist/SympotalkLauncher.apk
            dist/SympotalkLauncher-v${{ env.APK_VERSION }}.apk
