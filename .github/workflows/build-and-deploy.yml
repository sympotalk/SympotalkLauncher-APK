name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # gradle/actions/setup-gradle 이 wrapper jar + Gradle 캐싱 자동 처리
      - name: Setup Gradle 8.6
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'
          cache-read-only: false

      # 웹 파일을 Android assets에 복사 (번들 기본 버전)
      - name: Copy web assets into Android project
        run: |
          ASSETS="android-app/app/src/main/assets/www"
          mkdir -p "$ASSETS"
          cp index.html manifest.json sw.js version.txt "$ASSETS/"
          echo "Assets:"; ls -la "$ASSETS"

      # gradle 명령어로 직접 빌드 (gradlew wrapper 불필요)
      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --project-dir android-app
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Rename APK
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          mkdir -p dist
          cp android-app/app/build/outputs/apk/debug/app-debug.apk \
             "dist/SympotalkLauncher-v${VERSION}.apk"
          echo "APK_PATH=dist/SympotalkLauncher-v${VERSION}.apk" >> $GITHUB_ENV
          echo "APK_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SympotalkLauncher-APK
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Create GitHub Release (태그 푸시 시)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          name: "Sympotalk 런처 ${{ env.APK_VERSION }}"
          body: |
            ## Sympotalk 런처 ${{ env.APK_VERSION }}

            ### 설치 방법
            1. 태블릿: 설정 → 보안 → 알 수 없는 소스에서 앱 설치 허용
            2. 아래 APK 다운로드 후 설치
            3. 앱 실행 후 설정 탭에서 참석자/운영자 링크 주소 입력

            ### 업데이트 서버
            https://sympotalklauncher-apk.pages.dev
