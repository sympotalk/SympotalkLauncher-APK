name: Build Android APK

# Cloudflare Pages 배포는 Git 연동으로 자동 처리됨
# 이 워크플로우는 APK 빌드만 담당

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      # 루트의 웹 파일을 Android assets에 복사 (번들 기본 버전)
      - name: Copy web assets into Android project
        run: |
          ASSETS="android-app/app/src/main/assets/www"
          mkdir -p "$ASSETS"
          cp index.html manifest.json sw.js version.txt "$ASSETS/"
          echo "Assets copied:"; ls -la "$ASSETS"

      # Gradle wrapper jar 다운로드
      - name: Download Gradle wrapper jar
        run: |
          mkdir -p android-app/gradle/wrapper
          curl -sL -o android-app/gradle/wrapper/gradle-wrapper.jar \
            "https://services.gradle.org/distributions/gradle-wrapper-8.6.jar" || \
          curl -sL -o android-app/gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar" || \
          wget -q -O android-app/gradle/wrapper/gradle-wrapper.jar \
            "https://services.gradle.org/distributions/gradle-wrapper-8.6.jar" || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android-app/**/*.gradle*', 'android-app/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        run: |
          cd android-app
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx2048m"

      - name: Rename APK
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          mkdir -p dist
          cp android-app/app/build/outputs/apk/debug/app-debug.apk \
             "dist/SympotalkLauncher-v${VERSION}.apk"
          echo "APK_PATH=dist/SympotalkLauncher-v${VERSION}.apk" >> $GITHUB_ENV
          echo "APK_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SympotalkLauncher-APK
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Create GitHub Release (태그 푸시 시)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          name: "Sympotalk 런처 ${{ env.APK_VERSION }}"
          body: |
            ## Sympotalk 런처 ${{ env.APK_VERSION }}

            ### 설치 방법
            1. 태블릿: **설정 → 보안 → 알 수 없는 소스에서 앱 설치** 허용
            2. 아래 APK 다운로드 → 설치
            3. 앱 실행 후 **설정 탭**에서 참석자/운영자 링크 주소 입력

            ### 업데이트 서버
            - https://sympotalklauncher-apk.pages.dev
            - 앱 실행 시 자동으로 최신 버전 확인 및 적용 (APK 재설치 불필요)
