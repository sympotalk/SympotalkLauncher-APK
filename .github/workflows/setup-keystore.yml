name: 🔐 Setup Signing Keystore (일회성)

# 수동 실행 전용. 최초 1회만 실행해서 keystore를 repo에 커밋.
# 이후 모든 빌드가 이 keystore로 서명 → APK 삭제 없이 업데이트 가능.

on:
  workflow_dispatch:

permissions:
  contents: write   # keystore 커밋을 위해 write 필요

jobs:
  generate-and-commit-keystore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17 설치 (keytool 포함)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 기존 keystore 확인
        id: check
        run: |
          if [ -f android-app/release.keystore ]; then
            echo "이미 keystore 가 존재합니다. 중복 생성을 건너뜁니다."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Release keystore 생성
        if: steps.check.outputs.exists == 'false'
        run: |
          keytool -genkey -v \
            -keystore android-app/release.keystore \
            -alias sympotalk \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass sympotalk-launcher-2026 \
            -keypass sympotalk-launcher-2026 \
            -dname "CN=Sympotalk Launcher, O=Sympotalk, L=Seoul, C=KR"
          echo "keystore 생성 완료: $(ls -la android-app/release.keystore)"

      - name: repo에 keystore 커밋
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-app/release.keystore
          git commit -m "chore: add release keystore for consistent APK signing

          생성 정보:
          - alias: sympotalk
          - 유효기간: ~2053년
          - 알고리즘: RSA 2048
          - CN=Sympotalk Launcher, O=Sympotalk, L=Seoul, C=KR

          이 keystore 는 의도적으로 repo 에 포함됨 (키오스크 내부앱용).
          이후 모든 APK 빌드가 동일 서명을 사용 → 삭제 없이 업데이트 가능.

          Co-Authored-By: github-actions[bot] <noreply@github.com>"
          git push

      - name: 안내
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "::notice::keystore 이미 존재. 빌드 워크플로를 재실행하세요."
