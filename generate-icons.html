<!DOCTYPE html>
<!-- 아이콘 생성용 임시 파일: 브라우저에서 열어서 Save Image As로 저장하세요 -->
<html>
<body style="background:#0f172a;display:flex;gap:20px;padding:20px;align-items:flex-start">
<div>
  <canvas id="c192" width="192" height="192"></canvas>
  <p style="color:white;font-size:12px">icon-192.png 으로 저장</p>
</div>
<div>
  <canvas id="c512" width="512" height="512"></canvas>
  <p style="color:white;font-size:12px">icon-512.png 으로 저장</p>
</div>
<script>
function drawIcon(canvas, size) {
  var ctx = canvas.getContext('2d');
  var r = size * 0.125;

  // Background
  ctx.fillStyle = '#1e293b';
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // S letter
  ctx.fillStyle = '#60a5fa';
  ctx.font = 'bold ' + (size * 0.55) + 'px -apple-system, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', size / 2, size / 2 + size * 0.03);

  // Small dot
  ctx.fillStyle = '#22c55e';
  ctx.beginPath();
  ctx.arc(size * 0.72, size * 0.28, size * 0.06, 0, Math.PI * 2);
  ctx.fill();
}

drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);
</script>
</body>
</html>
